{% extends 'base.html' %}

{% block content %}
  {% load crispy_forms_tags %}
  <h3 class="text-center">Registration</h3>
  <form action="{% url 'register' %}" method="POST" style=" margin: auto;">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success">Register</button>
  </form>
{% endblock %}
